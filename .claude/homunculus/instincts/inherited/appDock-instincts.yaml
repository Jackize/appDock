# AppDock Workflow Add Backend Api Endpoint And Frontend Integration

## Action

Follow the add-backend-api-endpoint-and-frontend-integration workflow:
1. Create or update backend handler (backend/internal/handlers/feature_handler.go)
2. Create or update backend service (backend/internal/services/feature_service.go)
3. Update backend models if needed (backend/internal/models/feature.go)
4. Update backend/main.go to register new routes or services
5. Update or add frontend page (frontend/src/pages/Feature.tsx)
6. Update or add frontend hook (frontend/src/hooks/useFeature.ts)
7. Update frontend API service (frontend/src/services/api.ts)
8. Update frontend types (frontend/src/types/index.ts)
9. Update navigation/UI components as needed (e.g., Sidebar, App.tsx)

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: backend/internal/handlers/*.go, backend/internal/services/*.go, backend/internal/models/*.go

