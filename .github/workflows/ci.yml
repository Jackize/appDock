name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Detect which folders changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      agent: ${{ steps.filter.outputs.agent }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            agent:
              - 'agent/**'

  # Build Frontend - only if frontend changed
  frontend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck || true

      - name: Lint
        run: npm run lint || true

      - name: Build
        run: npm run build

      - name: Upload static assets
        uses: actions/upload-artifact@v4
        with:
          name: static-assets-ci
          path: frontend/dist/
          retention-days: 1

  # Build Backend - only if backend changed
  backend:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Prepare static placeholder
        run: mkdir -p static && touch static/.placeholder

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

  # Build Agent - only if agent changed
  agent:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    defaults:
      run:
        working-directory: ./agent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: agent/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

  # Validate binary build pipeline - if frontend OR backend changed
  build-binary:
    runs-on: ubuntu-latest
    needs: [changes, frontend, backend]
    if: |
      always() &&
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true') &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped') &&
      (needs.backend.result == 'success' || needs.backend.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: backend/go.sum

      - name: Download static assets
        uses: actions/download-artifact@v4
        with:
          name: static-assets-ci
          path: backend/static/
        continue-on-error: true

      - name: Build frontend if no artifact
        if: needs.changes.outputs.frontend != 'true'
        run: |
          cd frontend && npm ci && npm run build
          cp -r dist/. ../backend/static/

      - name: Copy frontend assets if artifact exists
        if: needs.changes.outputs.frontend == 'true'
        run: echo "Static assets downloaded from artifact"

      - name: Build binary (linux/amd64)
        run: make build-binary GOOS=linux GOARCH=amd64 BINARY=appdock-linux-amd64
