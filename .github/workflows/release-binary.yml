name: Release Binary

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="dev"
          fi
          # Remove 'v' prefix if present (v1.0.0 -> 1.0.0)
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: make build-frontend
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}

      - name: Upload static assets
        uses: actions/upload-artifact@v4
        with:
          name: static-assets
          path: backend/static/
          retention-days: 1

  build-binary:
    runs-on: ubuntu-latest
    needs: build-frontend
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: appdock-linux-amd64
          - goos: linux
            goarch: arm64
            name: appdock-linux-arm64
          - goos: darwin
            goarch: amd64
            name: appdock-darwin-amd64
          - goos: darwin
            goarch: arm64
            name: appdock-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download static assets
        uses: actions/download-artifact@v4
        with:
          name: static-assets
          path: backend/static/

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: backend/go.sum

      - name: Build binary
        run: make build-binary GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} BINARY=${{ matrix.name }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: backend/${{ matrix.name }}

  build-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: appdock-agent-linux-amd64
          - goos: linux
            goarch: arm64
            name: appdock-agent-linux-arm64
          - goos: darwin
            goarch: amd64
            name: appdock-agent-darwin-amd64
          - goos: darwin
            goarch: arm64
            name: appdock-agent-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: agent/go.sum

      - name: Build agent binary
        run: make build-agent GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} BINARY=${{ matrix.name }}

      - name: Upload agent to release
        uses: softprops/action-gh-release@v2
        with:
          files: agent/${{ matrix.name }}

  upload-installer:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload install scripts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            install.sh
            install-agent.sh
